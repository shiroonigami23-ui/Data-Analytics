name: Build Multi Platform Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build APK
        run: |
          gradle -p apps/android/dataanalytics-android :app:assembleDebug
          mkdir -p dist/android
          cp apps/android/dataanalytics-android/app/build/outputs/apk/debug/app-debug.apk dist/android/DataAnalytics-android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: dist/android/DataAnalytics-android.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desktop dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/desktop/requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller apps/desktop/app.py --onefile --name DataAnalytics --paths apps/desktop
          mkdir dist\windows
          copy dist\DataAnalytics.exe dist\windows\DataAnalytics-windows.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: dist/windows/DataAnalytics-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desktop dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/desktop/requirements.txt
          pip install pyinstaller

      - name: Build Linux Binary
        run: |
          pyinstaller apps/desktop/app.py --onefile --name DataAnalytics --paths apps/desktop
          mkdir -p dist/linux
          cp dist/DataAnalytics dist/linux/DataAnalytics-linux
          chmod +x dist/linux/DataAnalytics-linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: dist/linux/DataAnalytics-linux

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd apps/ios
          xcodegen generate

      - name: Build iOS App (unsigned)
        run: |
          cd apps/ios
          xcodebuild \
            -project DataAnalyticsIOS.xcodeproj \
            -scheme DataAnalyticsIOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p dist/ios/Payload
          cp -R apps/ios/build/Build/Products/Release-iphoneos/DataAnalyticsIOS.app dist/ios/Payload/
          cd dist/ios
          /usr/bin/zip -r DataAnalytics-ios-unsigned.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: dist/ios/DataAnalytics-ios-unsigned.ipa

  release:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows
      - build-linux
      - build-ios
    permissions:
      contents: write
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-artifact
          path: dist/android

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: dist/windows

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: dist/linux

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-artifact
          path: dist/ios

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/android/DataAnalytics-android.apk
            dist/windows/DataAnalytics-windows.exe
            dist/linux/DataAnalytics-linux
            dist/ios/DataAnalytics-ios-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
